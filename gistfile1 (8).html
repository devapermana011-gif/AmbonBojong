<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio TKJ - Cahyadi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Ambient Glowing Backgrounds */
        .glow-1 {
            position: absolute;
            top: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: #3b82f6;
            filter: blur(150px);
            opacity: 0.5;
            z-index: -1;
        }

        .glow-2 {
            position: absolute;
            bottom: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: #ec4899;
            filter: blur(150px);
            opacity: 0.5;
            z-index: -1;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hero Section */
        .hero {
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8%;
            gap: 50px;
        }

        .hero-text {
            flex: 1;
        }

        .tag {
            background: linear-gradient(90deg, #ff007f, #7928ca);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
        }

        .hero-text h1 {
            font-size: 3rem;
            line-height: 1.2;
            margin-bottom: 15px;
        }

        .highlight {
            background: linear-gradient(45deg, #00f2fe, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            color: #94a3b8;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Avatar Container */
        .hero-img-container {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .img-box {
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            padding: 8px;
            background: linear-gradient(45deg, #00f2fe, #ff007f);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background: #1e293b;
        }

        /* Dynamic Edit Photo Button */
        .change-photo-btn {
            display: none;
            position: absolute;
            bottom: 10px;
            right: 50%;
            transform: translateX(50%);
            background: #ffffff;
            color: #000;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Badges / Skills */
        .skills-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .skill-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Social Media Links */
        .socials {
            display: flex;
            gap: 15px;
        }

        .social-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.3rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.4);
        }

        .instagram:hover { background: #d62976; border-color: #d62976; }
        .tiktok:hover { background: #000000; border-color: #25f4ee; color: #25f4ee; }
        .youtube:hover { background: #ff0000; border-color: #ff0000; }
        .facebook:hover { background: #1877f2; border-color: #1877f2; }

        /* Floating Edit Mode Control */
        .edit-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Edit Mode Styles */
        body.editing [contenteditable="true"] {
            outline: 2px dashed #00f2fe;
            background: rgba(0, 242, 254, 0.1);
            border-radius: 4px;
            padding: 2px 4px;
        }

        body.editing .change-photo-btn {
            display: block;
        }

        /* Responsive Layout */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column-reverse;
                text-align: center;
                padding-top: 30px;
            }

            .hero-text h1 {
                font-size: 2.2rem;
            }

            .skills-grid {
                justify-content: center;
            }

            .socials {
                justify-content: center;
            }

            .img-box {
                width: 240px;
                height: 240px;
            }
        }
    </style>
</head>
<body>

    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <nav>
        <div class="logo">PROFIL TKJ</div>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <span class="tag" contenteditable="false">Teknik Komputer & Jaringan</span>
            <h1>
